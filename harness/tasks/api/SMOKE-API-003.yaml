id: SMOKE-API-003
title: API version endpoint returns version info
category: smoke
fixture_project: fixtures/projects/api-project
description: Verify that opencode API version endpoint returns version information
expected_outcome: API version returns version string
preconditions:
  - opencode API server running
entry_mode: API
agent_mode: Batch
provider_mode: Both
input:
  command: opencode
  args:
    - api
    - version
  cwd: /project
expected_assertions:
  - type: exit_code_equals
    value: 0
  - type: stdout_contains
    value: "version"
allowed_variance:
  exit_code:
    - 0
severity: Medium
tags:
  - smoke
  - api
  - version
execution_policy: ManualCheck
timeout_seconds: 30
on_missing_dependency: Blocked
