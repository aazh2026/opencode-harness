id: SMOKE-PERM-002
title: Permission denied when accessing protected resource
category: smoke
fixture_project: fixtures/projects/cli-basic
description: Verify that opencode denies access to protected resources without proper permission
expected_outcome: Access denied exits with non-zero code and displays permission error
preconditions:
  - opencode binary exists
entry_mode: Permissions
agent_mode: Interactive
provider_mode: Both
input:
  command: opencode
  args:
    - file
    - read
    - /root/secret.txt
  cwd: /project
expected_assertions:
  - type: exit_code_equals
    value: 1
  - type: stderr_contains
    value: "permission"
allowed_variance:
  exit_code:
    - 1
severity: Critical
tags:
  - smoke
  - permissions
  - denied
execution_policy: ManualCheck
timeout_seconds: 30
on_missing_dependency: Blocked
