id: SMOKE-WS-002
title: Workspace cleanup removes runtime artifacts
category: smoke
fixture_project: fixtures/projects/cli-basic
description: Verify that opencode workspace cleanup removes runtime artifacts correctly
expected_outcome: Workspace cleanup command exits with code 0 and removes runtime artifacts without affecting other files
preconditions:
  - opencode binary exists
entry_mode: Workspace
agent_mode: OneShot
provider_mode: Both
input:
