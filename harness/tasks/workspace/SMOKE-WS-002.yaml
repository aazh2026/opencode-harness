  args:
    - workspace
    - cleanup
  cwd: /project
expected_assertions:
  - type: exit_code_equals
    value: 0
  - type: no_extra_files_changed
allowed_variance:
  exit_code:
    - 0
severity: Medium
tags:
  - smoke
  - workspace
  - cleanup
execution_policy: ManualCheck
timeout_seconds: 60
on_missing_dependency: Warn