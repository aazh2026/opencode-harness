id: SMOKE-WS-003
title: Workspace status displays current state
category: smoke
fixture_project: fixtures/projects/cli-basic
description: Verify that opencode workspace status displays current workspace state
expected_outcome: Workspace status exits with code 0 and displays status information
preconditions:
  - opencode binary exists
  - git available
entry_mode: Workspace
agent_mode: OneShot
provider_mode: Both
input:
  command: opencode
  args:
    - workspace
    - status
  cwd: /project
expected_assertions:
  - type: exit_code_equals
    value: 0
  - type: stdout_contains
    value: "status"
allowed_variance:
  exit_code:
    - 0
severity: Medium
tags:
  - smoke
  - workspace
  - status
execution_policy: ManualCheck
timeout_seconds: 30
on_missing_dependency: Warn
