name: CI (Release Gate)

on:
  push:
    tags:
      - 'v*'
    branches:
      - main

jobs:
  parity-release:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=main-latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: cargo build --release

      - name: Run release gate validation tests
        run: |
          cargo test --test ci_gate_smoke_tests -p opencode-core
          cargo test --test report_schema_smoke_tests -p opencode-core
          cargo test --test suite_selection_smoke_tests -p opencode-core
          cargo check --all

      - name: Generate release artifacts
        run: |
          cargo run -p opencode-harness -- report --output json > parity-report.json
          cargo run -p opencode-harness -- report --output md > parity-report.md
          cargo run -p opencode-harness -- report --output junit > parity-report.xml
          python3 - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path('parity-report.json').read_text())
          gate = report.get('gate_evaluation') or {}
          summary = gate.get('summary') or {}
          metrics = {
              'gate_level': gate.get('level'),
              'gate_passed': gate.get('passed'),
              'total_tasks': summary.get('total_tasks'),
              'passed_tasks': summary.get('passed_tasks'),
              'failed_tasks': summary.get('failed_tasks'),
              'error_tasks': summary.get('error_tasks'),
              'pass_rate': summary.get('pass_rate'),
              'trigger': 'release',
          }
          Path('metrics.json').write_text(json.dumps(metrics, indent=2) + '\n')
          PY

      - name: Upload release report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: parity-report-release-${{ steps.version.outputs.version }}
          path: |
            parity-report.json
            parity-report.md
            parity-report.xml
            metrics.json
          retention-days: 180

      - name: Create GitHub release annotation
        if: always()
        run: |
          echo "=== Release Gate Results ==="
          cat parity-report.md
          echo "=== Metrics ==="
          cat metrics.json

  release-blocker:
    needs: parity-release
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify release failure
        run: |
          echo "::error::Release gate failed! Cannot proceed with release."
          exit 1
